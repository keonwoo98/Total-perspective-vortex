[pytest]
markers =
    network: test downloads PhysioNet data (slow, needs internet)
testpaths = tests
filterwarnings =
    # MNE's internal CSP (exercised only by the parity test) emits spurious matmul
    # FP warnings on numpy 2.x + macOS Accelerate; the results are numerically correct.
    ignore:.*matmul:RuntimeWarning
    # sklearn LogisticRegression -> scipy L-BFGS-B future-deprecation notice.
    ignore:.*L-BFGS-B:DeprecationWarning
